<div class="tc-bar">
  <div class="tc-label">
    <mat-icon>currency_exchange</mat-icon>
    <span>Tipo de cambio</span>
  </div>
  <div class="tc-input-wrap">
    <span class="tc-prefix">$</span>
    <input class="tc-input" type="number"
      [value]="month.exchangeRate"
      (change)="onRateChange($any($event.target).value)"
      [readonly]="month.isClosed"
      min="1" />
    <span class="tc-suffix">ARS/USD</span>
  </div>
</div>
